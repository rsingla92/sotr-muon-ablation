name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-flight run if a newer commit lands on the same branch.
concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false # we don't lint external/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pin to the same ruff version pyproject.toml expects (>=0.7).
      # Keep this aligned with .pre-commit-config.yaml (rev: v0.7.4) for
      # consistency between local pre-commit (if developers opt in) and CI.
      - name: Install ruff
        run: pip install "ruff>=0.7,<0.12"

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .
