# Pre-commit hooks. Install with: pip install pre-commit && pre-commit install
# Run manually with: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=2000"]  # block accidental commits of model checkpoints
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: no-todo-in-commits
        name: Block TODO in committed code
        # CONTRIBUTING.md: TODO comments are not allowed in committed code.
        # Use a tracked task instead. Strings in tests/docstrings about TODO are fine.
        entry: bash -c 'if git diff --cached --name-only -z | xargs -0 grep -nE "^[^#]*\bTODO\b" --include="*.py" 2>/dev/null; then echo "Found TODO in staged Python source. Replace with a tracked task."; exit 1; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]
