name: cot-go-transformer-ci

on:
  push:
    paths:
      - 'cot-go-transformer/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'cot-go-transformer/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: cot-go-transformer

jobs:
  cpu-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          # Install minimal deps without torch first (most tests don't need it).
          pip install numpy pyyaml pytest ruff
      - name: Lint with ruff
        run: ruff check gogpt scripts tests
      - name: Run CPU tests (no torch, no KataGo)
        env:
          # Tests that need torch use pytest.importorskip; KataGo tests are
          # gated by the conftest marker.
          PYTHONPATH: .
        run: |
          pytest -q tests/test_tokenizer.py tests/test_data_pipeline.py \
                    tests/test_concepts.py tests/test_cot.py

  torch-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install CPU PyTorch
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install numpy pyyaml pytest
      - name: Install gogpt
        run: pip install -e .
      - name: Run torch-dependent tests
        run: pytest -q tests/test_attention_mask.py tests/test_smoke_forward.py
